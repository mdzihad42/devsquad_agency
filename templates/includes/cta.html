<!-- ========== GLOBAL CTA SECTION ========== -->
<section class="relative py-40 overflow-hidden" id="cta-section">
    <!-- Background Effects -->
    <div class="absolute inset-0">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-sunset-orange/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="relative z-10 text-center max-w-4xl mx-auto px-4 sm:px-6 scroll-reveal">
        <h2 class="text-4xl sm:text-5xl md:text-6xl font-black mb-8 tracking-tighter leading-tight">Ready to Engineer Your <span class="bg-gradient-to-r from-sunset-orange to-sunset-amber bg-clip-text text-transparent">Digital Future?</span></h2>
        <p class="text-white/70 text-xl mb-12 max-w-2xl mx-auto leading-relaxed">Partner with the elite team at DevSquad to build software that scales, performs, and dominates.</p>
        
        <div class="flex flex-wrap justify-center gap-6">
            <a href="{% url 'contact' %}" class="group inline-flex items-center space-x-3 px-12 py-5 bg-sunset-orange text-white font-bold rounded-full hover:shadow-[0_0_60px_rgba(249, 115, 22, 0.5)] transform hover:-translate-y-1 transition-all duration-300 text-xl" id="global-cta-start">
                <span>Initiate Project</span>
                <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform duration-300"></i>
            </a>
            <a href="https://wa.me/{{ site.whatsapp_number }}" class="group inline-flex items-center space-x-3 px-12 py-5 bg-white/5 border border-white/10 text-white font-bold rounded-full hover:bg-white/10 transition-all duration-300 text-xl" id="global-cta-wa">
                <i class="fab fa-whatsapp text-emerald-500"></i>
                <span>Quick Chat</span>
            </a>
        </div>
    </div>
</section>
