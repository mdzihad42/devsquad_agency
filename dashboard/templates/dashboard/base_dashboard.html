{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mzify Admin Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mzify: {
                            orange: '#D76A1D',
                            dark: '#4B200B',
                            light: '#fffbf9',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .sidebar-link.active {
            background-color: rgba(215, 106, 29, 0.1);
            color: #D76A1D;
            border-right: 4px solid #D76A1D;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col fixed h-full z-50">
        <div class="p-6 border-b border-slate-100 flex items-center space-x-2">
            <div class="w-8 h-8 rounded bg-mzify-orange flex items-center justify-center text-white font-black">m</div>
            <span class="text-xl font-black tracking-tight"><span class="text-mzify-orange">mz</span><span
                    class="text-mzify-dark">ify</span></span>
        </div>

        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a href="{% url 'dashboard_home' %}"
                class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors {% if request.resolver_match.url_name == 'dashboard_home' %}active{% endif %}">
                <i class="fas fa-chart-line w-5"></i>
                <span class="font-semibold text-sm">Dashboard</span>
            </a>
            <a href="{% url 'dashboard_messages' %}"
                class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors {% if 'messages' in request.path %}active{% endif %}">
                <i class="fas fa-envelope w-5"></i>
                <span class="font-semibold text-sm">Messages</span>
            </a>
            <a href="{% url 'dashboard_portfolio' %}"
                class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors {% if 'portfolio' in request.path %}active{% endif %}">
                <i class="fas fa-project-diagram w-5"></i>
                <span class="font-semibold text-sm">Portfolio</span>
            </a>
            <a href="{% url 'dashboard_finances' %}"
                class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors {% if 'finances' in request.path %}active{% endif %}">
                <i class="fas fa-wallet w-5"></i>
                <span class="font-semibold text-sm">Finances</span>
            </a>
            <a href="{% url 'dashboard_seo' %}"
                class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors {% if 'seo' in request.path %}active{% endif %}">
                <i class="fas fa-search w-5"></i>
                <span class="font-semibold text-sm">SEO Manager</span>
            </a>
            <div class="pt-4 pb-2 px-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Quick Actions</div>
            <a href="/" target="_blank"
                class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors">
                <i class="fas fa-external-link-alt w-5"></i>
                <span class="font-semibold text-sm">View Website</span>
            </a>
        </nav>

        <div class="p-4 border-t border-slate-100">
            <div class="flex items-center space-x-3 px-4 py-3">
                <div
                    class="w-10 h-10 rounded-full bg-mzify-dark flex items-center justify-center text-white text-xs font-bold uppercase">
                    AD</div>
                <div class="flex-1">
                    <p class="text-sm font-bold text-mzify-dark truncate">{{ user.username }}</p>
                    <p class="text-xs text-slate-500">Administrator</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 flex-1 flex flex-col min-h-screen">
        <!-- Top Header -->
        <header
            class="bg-white border-b border-slate-100 h-20 flex items-center justify-between px-8 sticky top-0 z-40">
            <h2 class="text-xl font-bold text-mzify-dark">{% block header_title %}Welcome Back{% endblock %}</h2>
            <div class="flex items-center space-x-4">
                <button class="relative p-2 text-slate-400 hover:text-mzify-orange transition-colors">
                    <i class="far fa-bell text-xl"></i>
                    <span
                        class="absolute top-1 right-1 w-2 h-2 bg-mzify-orange rounded-full border-2 border-white"></span>
                </button>
                <a href="/admin/logout/"
                    class="px-4 py-2 bg-mzify-dark text-white rounded-lg text-sm font-bold hover:bg-black transition-colors">Logout</a>
            </div>
        </header>

        <!-- Page Content -->
        <div class="p-8">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>

</html>
