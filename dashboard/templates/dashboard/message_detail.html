{% extends 'dashboard/base_dashboard.html' %}

{% block header_title %}Message Detail{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <a href="{% url 'dashboard_messages' %}"
        class="inline-flex items-center text-sm font-bold text-slate-400 hover:text-mzify-orange mb-6 transition-colors">
        <i class="fas fa-arrow-left mr-2"></i> Back to Messages
    </a>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="p-8 border-b border-slate-100 flex justify-between items-start">
            <div>
                <h3 class="text-2xl font-black text-mzify-dark mb-2">{{ msg.name }}</h3>
                <p class="text-mzify-orange font-bold text-sm">{{ msg.email }}</p>
            </div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">{{ msg.created_at|date:"d M Y, H:i" }}
            </p>
        </div>

        <div class="p-8 bg-slate-50/50">
            <p class="text-slate-700 leading-relaxed whitespace-pre-line">{{ msg.message }}</p>
        </div>

        <div class="p-8 border-t border-slate-100 flex space-x-4">
            <a href="mailto:{{ msg.email }}"
                class="flex-1 px-6 py-4 bg-mzify-dark text-white text-center font-black rounded-xl hover:bg-black transition-all">
                <i class="fas fa-reply mr-2"></i> Reply via Email
            </a>
            <button
                class="px-6 py-4 bg-white border border-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition-all">
                <i class="fas fa-archive mr-2"></i> Archive
            </button>
        </div>
    </div>
</div>
{% endblock %}
