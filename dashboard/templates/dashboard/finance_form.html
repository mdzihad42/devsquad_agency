{% extends 'dashboard/base_dashboard.html' %}

{% block header_title %}Add Transaction{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white p-8 rounded-2xl border border-slate-100 shadow-sm">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-mzify-dark mb-2">Transaction Title</label>
                <input type="text" name="title" required placeholder="e.g. Website Project Payment"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-mzify-orange focus:ring-2 focus:ring-mzify-orange/10 outline-none transition-all">
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-mzify-dark mb-2">Amount ($)</label>
                    <input type="number" step="0.01" name="amount" required placeholder="0.00"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-mzify-orange focus:ring-2 focus:ring-mzify-orange/10 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-mzify-dark mb-2">Date</label>
                    <input type="date" name="date" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-mzify-orange focus:ring-2 focus:ring-mzify-orange/10 outline-none transition-all">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-mzify-dark mb-2">Category</label>
                    <input type="text" name="category" required placeholder="e.g. Design, Hosting"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-mzify-orange focus:ring-2 focus:ring-mzify-orange/10 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-mzify-dark mb-2">Type</label>
                    <select name="type" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-mzify-orange focus:ring-2 focus:ring-mzify-orange/10 outline-none transition-all">
                        <option value="INCOME">Income</option>
                        <option value="EXPENSE">Expense</option>
                    </select>
                </div>
            </div>

            <div class="pt-4 flex space-x-4">
                <button type="submit"
                    class="flex-1 py-4 bg-mzify-orange text-white font-black rounded-xl shadow-lg shadow-mzify-orange/20 hover:shadow-mzify-orange/40 transition-all">
                    Save Transaction
                </button>
                <a href="{% url 'dashboard_finances' %}"
                    class="px-8 py-4 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-all text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
